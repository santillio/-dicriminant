<!doctype html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Квадратное уравнение — интерфейс</title>
	<style>
		body{font-family:Segoe UI,Arial,Helvetica,sans-serif;margin:24px}
		label{display:block;margin:8px 0 4px}
		input[type=number]{width:120px;padding:6px}
		button{margin-top:12px;padding:8px 12px}
		#out{margin-top:16px;padding:10px;border:1px solid #ddd;background:#f9f9f9}
	</style>
</head>
<body>
	<h1>Решение квадратного уравнения</h1>
	<p>Введите коэффициенты уравнения <strong>ax² + bx + c = 0</strong> и нажмите «Решить».</p>

	<div>
		<label for="a">a</label>
		<input id="a" type="number" step="any" value="1">
		<label for="b">b</label>
		<input id="b" type="number" step="any" value="-3">
		<label for="c">c</label>
		<input id="c" type="number" step="any" value="2">
		<div>
			<button id="solve">Решить</button>
			<span id="status" style="margin-left:12px;color:#666">Загрузка Pyodide...</span>
		</div>
	</div>

	<div id="out">Результат появится здесь.</div>

	<script>
		const status = document.getElementById('status');
		const out = document.getElementById('out');
		let pyodide = null;

		async function initPyodide(){
			status.textContent = 'Загружаю Pyodide...';
			pyodide = await loadPyodide({indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.23.4/full/'});
			status.textContent = 'Подгружаю модуль discriminant.py...';
			const resp = await fetch('discriminant.py');
			const code = await resp.text();

			// Создаём модуль discriminant из текста файла
			const wrapper = `import types, sys
		module = types.ModuleType('discriminant')\nexec(r'''${code}''', module.__dict__)\nsys.modules['discriminant']=module\nglobals()['discriminant']=module`;
			await pyodide.runPythonAsync(wrapper);
			status.textContent = 'Готово';
		}

		async function solve(){
			if(!pyodide){ out.textContent = 'Pyodide не загружен'; return }
			const a = parseFloat(document.getElementById('a').value);
			const b = parseFloat(document.getElementById('b').value);
			const c = parseFloat(document.getElementById('c').value);
			status.textContent = 'Вычисляю...';

			try{
				const result = await pyodide.runPythonAsync(`discriminant.solve(${a}, ${b}, ${c})`);
				// Преобразование результата: Pyodide отдаёт JS-объекты
				if(Array.isArray(result) && result.length === 0){
					out.textContent = 'Корней нет';
				} else if(Array.isArray(result) && result.length === 1 && result[0] === 'infinite'){
					out.textContent = 'Бесконечно много решений';
				} else if(Array.isArray(result) && result.length === 1){
					out.textContent = `Один корень: ${Number(result[0]).toFixed(6)}`;
				} else if(Array.isArray(result) && result.length === 2){
					out.textContent = `Два корня: x1 = ${Number(result[0]).toFixed(6)}, x2 = ${Number(result[1]).toFixed(6)}`;
				} else {
					out.textContent = String(result);
				}
			} catch(err){
				out.textContent = 'Ошибка: ' + err;
			} finally{
				status.textContent = 'Готово';
			}
		}

		document.getElementById('solve').addEventListener('click', solve);

		// Подключаем Pyodide динамически
		(function(){
			const s = document.createElement('script');
			s.src = 'https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js';
			s.onload = initPyodide;
			document.head.appendChild(s);
		})();
	</script>
</body>
</html>
